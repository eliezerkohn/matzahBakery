      <rect x="-48" y="60" width="98" height="40" rx="5" fill="url(#brickFace)"/>
      <rect x="58" y="60" width="98" height="40" rx="5" fill="url(#brickFace)"/>
      <rect x="164" y="60" width="98" height="40" rx="5" fill="url(#brickFace)"/>

      <rect x="20" y="16" width="70" height="4" fill="#D28066" opacity="0.35"/>
      <rect x="126" y="16" width="70" height="4" fill="#D28066" opacity="0.35"/>
